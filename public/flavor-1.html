<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Adjust deeplinking...</title>
    <meta property="al:android:package" content="com.adjust.insights" />
    <meta property="al:android:url"
          content="https://insights.go.link/privacy" />
    <meta property="al:web:url"
          content="https://insights.go.link/multi-store-1?to_store=true" />

    <style type="text/css">
        body {
            background-color: #f1f1f1;
            font-family: "Maven Pro", sans-serif;
            text-align: center;
        }
        img {
            border-radius: 26px;
            box-shadow: 0 0 3px #b8b8b8;
            height: auto;
            margin-top: 15vh;
            max-width: 100px;
            width: 100%;
        }
        h1 {
            color: #575757;
            font-size: 1.2em;
            margin-bottom: 5vh;
        }
        .btn {
            background-color: #00bed5;
            border: 2px solid #00bed5;
            color: #fff;
            display: inline-block;
            font-weight: 700;
            letter-spacing: 0.1em;
            max-width: 200px;
            padding: 10px;
            text-decoration: none;
            text-transform: uppercase;
            transition: all .3s ease-in-out;
            width: 80%;
            cursor: pointer;
        }
        p {
            color: #b8b8b8;
            margin-top: 5vh;
            padding: 0 20px;
        }
    </style>
</head>

<body>
<img
    src="https://www.apptrace.com/api/app/1125517808/artwork_url_512"
    alt="Adjust Insights - Android"
/>

<h1 id="app-title">Adjust Insights</h1>

<a id="open-btn" href="https://insights.go.link/multi-store-1" class="btn">Open App</a>

<p id="redirect-msg">If the app doesn't open, you'll be sent to the App Store.</p>

<script>
    /*
        The app should be opened by the Android App Links (AAL) mechanism (automatically via the HTTPS link).
        If the ALL mechanism was not successful for some reason (i.e., the app that contains the link
        intercepts the link tap), then show the button with the "Open Link" button. Clicking it should
        trigger the AAL mechanism correctly.
    */
    (function() {
      const translations = {
        'en': { btn: 'Open App', msg: "If the app doesn't open, you'll be sent to the Store." },
        'zh': { btn: '打开应用', msg: '如果应用未打开，您将被引导至商店。' },
        'fr': { btn: "Ouvrir l'application", msg: "Si l'application ne s'ouvre pas, vous serez redirigé vers le Store." },
        'ja': { btn: 'アプリを開く', msg: 'アプリが開かない場合は、ストアに移動します。' },
        'ko': { btn: '앱 열기', msg: '앱이 열리지 않으면 스토어로 이동합니다.' },
        'pt': { btn: 'Abrir aplicativo', msg: 'Se o aplicativo não abrir, você será redirecionado para a Loja.' },
        'ru': { btn: 'Открыть приложение', msg: 'Если приложение не откроется, вы будете перенаправлены в магазин.' },
        'es': { btn: 'Abrir aplicación', msg: 'Si la aplicación no se abre, se le enviará a la Tienda.' },
        'tr': { btn: 'Uygulamayı Aç', msg: "Uygulama açılmazsa Mağaza'ya yönlendirileceksiniz." },
        'vi': { btn: 'Mở ứng dụng', msg: 'Nếu ứng dụng không mở, bạn sẽ được chuyển đến Cửa hàng.' }
      };

      const lang = navigator.language.split('-')[0];
      const t = translations[lang] || translations['en'];

      document.getElementById('open-btn').innerText = t.btn;
      document.getElementById('redirect-msg').innerText = t.msg;

      const urlParams = new URLSearchParams(window.location.search);
        const shouldRedirect = urlParams.get('to_store') === 'true';
        const timeout = shouldRedirect ? 0 : 2000;

        setTimeout(function() {
            /*
                Using the "market" protocol here to force the store selection on devices with multiple stores
             */
            window.location = "market://details?id=com.adjust.insights&referrer=adjust_reftag%3DcqFP0hxAN5PeY%26utm_source%3Drouting-flavours%26utm_campaign%3Drouting-flavour-0-control-no-redirect";
          // window.location = "intent://details?id=com.adjust.insights#Intent;scheme=market;action=android.intent.action.VIEW;end";
        }, timeout);
    })();
</script>
</body>
</html>
