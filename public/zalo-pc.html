<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Redirecting to App Store...</title>
    <meta property="al:ios:app_store_id" content="1125517808" />
    <meta property="al:ios:app_name" content="Adjust Insights" />
    <meta property="al:ios:url" content="https://insights.go.link/privacy" />
    <meta property="al:android:package" content="com.adjust.insights" />
    <meta property="al:android:url"
          content="https://insights.go.link/privacy" />
    <meta property="al:web:url"
          content="https://insights.go.link/zalo-pc?to_store=true" />
    <style type="text/css">
        body {
            background-color: #f1f1f1;
            font-family: "Maven Pro", sans-serif;
            text-align: center;
        }
        img {
            border-radius: 26px;
            box-shadow: 0 0 3px #b8b8b8;
            height: auto;
            margin-top: 15vh;
            max-width: 100px;
            width: 100%;
        }
        h1 {
            color: #575757;
            font-size: 1.2em;
            margin-bottom: 5vh;
        }
        .btn {
            background-color: #00bed5;
            border: 2px solid #00bed5;
            color: #fff;
            display: inline-block;
            font-weight: 700;
            letter-spacing: 0.1em;
            max-width: 200px;
            padding: 10px;
            text-decoration: none;
            text-transform: uppercase;
            transition: all .3s ease-in-out;
            width: 80%;
            cursor: pointer;
        }
        p {
            color: #b8b8b8;
            margin-top: 5vh;
            padding: 0 20px;
        }
    </style>
</head>
<body>
<img
        src="https://www.apptrace.com/api/app/1125517808/artwork_url_512"
        alt="Adjust Insights - iOS"
/>
<h1>Adjust Insights</h1>

<a href="https://insights.go.link/zalo-pc" class="btn">Open App</a>
<p>If the app doesn't open, you'll be sent to the App Store.</p>
<script>
    (function() {
        const urlParams = new URLSearchParams(window.location.search);
        const shouldRedirect = urlParams.get('to_store') === 'true';
        const timeout = shouldRedirect ? 0 : 2000;
        setTimeout(function() {
            window.location = "https://apps.apple.com/app/id1125517808";
        }, timeout);
    })();
</script>
</body>
